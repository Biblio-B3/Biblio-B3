services:

  back:
    image: superknacky/node_api_b3:latest
    container_name: Biblio-back
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  front:
    image: superknacky/react_app_b3:latest
    container_name: Biblio-front
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:stable-alpine
    container_name: Biblio-nginx
    ports:
      - "81:80"

  db:
    image: postgres:14.15-alpine3.21
    container_name: Biblio-postgres
    restart: always
    environment:
      POSTGRES_DB: Librario
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - ./db:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: Biblio-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db